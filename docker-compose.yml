services:
  hermes:
    build:
      context: .
      dockerfile: Dockerfile.hermes
    pull_policy: never
    image: hermes-agent:local
    container_name: hermes
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      HERMES_HOME: /opt/data
      HERMES_UID: ${HERMES_UID:-1000}
      HERMES_GID: ${HERMES_GID:-1000}
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      COPILOT_GITHUB_TOKEN: ${GITHUB_TOKEN}
      API_SERVER_HOST: 0.0.0.0
      API_SERVER_PORT: ${API_SERVER_PORT:-8642}
      API_SERVER_KEY: ${API_SERVER_KEY}
    command: ["gateway", "run"]
    ports:
      - "127.0.0.1:${API_SERVER_PORT:-8642}:8642"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - hermes-home:/opt/data
      - hermes-agent-src:/opt/hermes
      - .:/workspace
      - ./hermes/config.yaml:/bootstrap/config.yaml:ro
      - ./hermes/SOUL.md:/bootstrap/SOUL.md:ro
      - searxng-cache:/tmp/screenshots
    depends_on:
      skillserver:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:${API_SERVER_PORT:-8642}/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 5
    networks:
      - ai-bridge

  dashboard:
    pull_policy: never
    image: hermes-agent:local
    container_name: hermes-dashboard
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      HERMES_HOME: /opt/data
      HERMES_UID: ${HERMES_UID:-1000}
      HERMES_GID: ${HERMES_GID:-1000}
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      COPILOT_GITHUB_TOKEN: ${GITHUB_TOKEN}
    command: ["dashboard", "--host", "0.0.0.0", "--no-open", "--insecure"]
    expose:
      - "9119"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - hermes-home:/opt/data
      - .:/workspace
      - ./hermes/config.yaml:/bootstrap/config.yaml:ro
      - ./hermes/SOUL.md:/bootstrap/SOUL.md:ro
      - searxng-cache:/tmp/screenshots
    depends_on:
      hermes:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9119/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 5
    networks:
      - ai-bridge

  hermes-webui:
    build:
      context: .
      dockerfile: Dockerfile.hermeswebui
    pull_policy: never
    image: hermes-webui:local
    container_name: hermes-webui
    expose:
      - "8787"
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      HERMES_HOME: /home/hermeswebui/.hermes
      HERMES_CONFIG_PATH: /home/hermeswebui/.hermes/config.yaml
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      COPILOT_GITHUB_TOKEN: ${GITHUB_TOKEN}
      HERMES_WEBUI_HOST: 0.0.0.0
      HERMES_WEBUI_PORT: 8787
      HERMES_WEBUI_STATE_DIR: /home/hermeswebui/.hermes/webui
      HERMES_WEBUI_DEFAULT_WORKSPACE: /workspace
      WANTED_UID: ${HERMES_UID:-1000}
      WANTED_GID: ${HERMES_GID:-1000}
    depends_on:
      hermes:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8787/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 5
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - hermes-home:/home/hermeswebui/.hermes
      - hermes-agent-src:/home/hermeswebui/.hermes/hermes-agent
      - hermes-webui-app:/app
      - hermes-webui-uv-cache:/uv_cache
      - .:/workspace
    networks:
      - ai-bridge

  skillserver:
    build:
      context: .
      dockerfile: skillserver/Dockerfile.skillserver
    pull_policy: never
    image: skillserver:local
    container_name: skillserver
    expose:
      - "3000"
    environment:
      - TZ=${TZ:-Asia/Shanghai}
      - HOST=0.0.0.0
      - PORT=3000
      - SSL_CERTFILE=/app/certs/local-https.fullchain.crt
      - SSL_KEYFILE=/app/certs/local-https.key
      - SEARXNG_URL=http://searxng:8080
      - SEARXNG_TIMEOUT=30
      - PAGE_TIMEOUT=30000
      - FETCH_CONCURRENCY=3
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./skillserver/server.py:/app/server.py:ro
      - ./skillserver/web_core.py:/app/web_core.py:ro
      - searxng-cache:/tmp/screenshots
    depends_on:
      - searxng
    restart: always
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; print(urllib.request.urlopen('https://127.0.0.1:3000/health', timeout=5).status)"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 5
    networks:
      - ai-bridge

  https-proxy:
    image: nginx:1.27-alpine
    container_name: hermes-https-proxy
    ports:
      - "${HERMES_BIND_HOST:-0.0.0.0}:${HERMES_DASHBOARD_PORT:-9119}:9119"
      - "${HERMES_BIND_HOST:-0.0.0.0}:${HERMES_WEBUI_PORT:-8787}:8787"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./docker/https-proxy.nginx.conf:/etc/nginx/nginx.conf:ro
      - ./httpscert:/certs:ro
    depends_on:
      dashboard:
        condition: service_healthy
      hermes-webui:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ai-bridge

  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    expose:
      - "8080"
    environment:
      - TZ=${TZ:-Asia/Shanghai}
      - SEARXNG_SECRET=${SEARXNG_SECRET}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - searxng-config:/etc/searxng
      - searxng-cache:/var/cache/searxng
      - ./searxng/settings.yml:/etc/searxng/settings.yml:ro
    restart: always
    networks:
      - ai-bridge

networks:
  ai-bridge:
    driver: bridge

volumes:
  hermes-home:
  hermes-agent-src:
  hermes-webui-app:
  hermes-webui-uv-cache:
  searxng-cache:
  searxng-config:
