events {}

http {
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    proxy_http_version 1.1;
    proxy_buffering off;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;

    server {
        listen 9119 ssl default_server;
        server_name _;

        ssl_certificate /certs/local-https.fullchain.crt;
        ssl_certificate_key /certs/local-https.key;

        location / {
            proxy_pass http://dashboard:9119;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
    }

    server {
        listen 8787 ssl default_server;
        server_name _;

        ssl_certificate /certs/local-https.fullchain.crt;
        ssl_certificate_key /certs/local-https.key;

        location / {
            proxy_pass http://hermes-webui:8787;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
    }
}